name: Deploy to Cloudflare Workers

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "deploy-workers"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate master data
        run: npm run generate

      - name: Verify generated master data
        run: git diff --exit-code -- src/data/characterMaster.generated.json

      # worker-configuration.d.ts は gitignore 済みのため、型チェック/ビルド前に生成する。
      - name: Generate Worker types
        run: npm run cf-typegen

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      # デプロイ前に D1 マイグレーションを本番 DB に適用する（未適用分のみが実行される）。
      # DB 未作成（database_id がプレースホルダ）のうちは deploy と同様に実行不能だが、
      # ユーザー作業（D1 作成・secrets 登録）完了後に一体で動く構成にしている。
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply pcre-tracker-db --remote

      # ビルド直後に同一 job 内でデプロイする（dist・wrangler.jsonc・Worker ソースが揃った状態を保つため）。
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # vite build が dist/ に成果物と生成 wrangler.json を出力済みのため、deploy のみ実行する。
          command: deploy
