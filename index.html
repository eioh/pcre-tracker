<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <!-- ブラウザ UI やスプラッシュをスレートナイト背景色に合わせる。 -->
    <meta name="theme-color" content="#0d1117" />
    <!-- iOS ホーム画面追加時のアイコン（不透明化済み 180x180）。 -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <!-- iOS 16.4 未満は manifest の display: standalone を尊重しないため、旧来メタで補助する。 -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="プリコネ育成" />
    <title>プリコネ育成トラッカー</title>
    <!-- フォント取得の接続を先行して開始し、表示遅延を抑える。 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
